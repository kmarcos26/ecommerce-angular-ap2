<section class="row justify-content-center">
  <div class="col-md-5">

    <div class="card shadow-sm" *ngIf="usuario; else formularioLogin">
      <div class="card-body text-center">
        <h2 class="fw-bold mb-3">Sesión activa</h2>

        <div class="alert alert-success text-start">
          <p class="mb-1">
            <strong>Nombre:</strong> {{ usuario.nombre }}
          </p>

          <p class="mb-1">
            <strong>Correo:</strong> {{ usuario.correo }}
          </p>

          <p class="mb-0">
            <strong>Rol:</strong> {{ usuario.rol }}
          </p>
        </div>

        <a routerLink="/dashboard" class="btn btn-primary me-2">
          Ir al Dashboard
        </a>

        <button class="btn btn-danger" (click)="cerrarSesion()">
          Cerrar sesión
        </button>
      </div>
    </div>

    <ng-template #formularioLogin>
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="fw-bold mb-3 text-center">Login</h2>

          <p class="text-muted text-center">
            Ingresa con el usuario de prueba para acceder al Dashboard.
          </p>

          <div class="alert alert-info">
            <strong>Usuario:</strong> admin&#64;demo.com <br>
            <strong>Contraseña:</strong> 123456
          </div>

          <div *ngIf="mensajeError" class="alert alert-danger">
            {{ mensajeError }}
          </div>

          <form (ngSubmit)="iniciarSesion()">
            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input
                type="email"
                class="form-control"
                name="correo"
                placeholder="admin@demo.com"
                [(ngModel)]="correo"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control"
                name="password"
                placeholder="123456"
                [(ngModel)]="password"
              >
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Iniciar sesión
            </button>
          </form>
        </div>
      </div>
    </ng-template>

  </div>
</section>
