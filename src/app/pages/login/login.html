<section class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="fw-bold mb-3 text-center">Login</h2>

        <p class="text-muted text-center">
          Ingresa con el usuario de prueba para acceder al Dashboard.
        </p>

        <div class="alert alert-info">
          <strong>Usuario:</strong> admin&#64;demo.com <br>
          <strong>Contraseña:</strong> 123456
        </div>

        <div *ngIf="mensajeError" class="alert alert-danger">
          {{ mensajeError }}
        </div>

        <form (ngSubmit)="iniciarSesion()">
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input
              type="email"
              class="form-control"
              name="correo"
              placeholder="admin@demo.com"
              [(ngModel)]="correo"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-control"
              name="password"
              placeholder="123456"
              [(ngModel)]="password"
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Iniciar sesión
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
